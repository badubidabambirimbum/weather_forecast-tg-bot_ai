<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прогноз погоды</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%232563eb'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <div class="form-intro">
          <h1>Прогноз погоды</h1>
          <p class="hint">Данные Open‑Meteo. Укажите город и срок прогноза.</p>
        </div>

        <form id="forecastForm" novalidate>
          <div class="form-fields">
            <div class="city-field">
              <label for="cityInput">Город</label>
              <input
                id="cityInput"
                name="city"
                type="text"
                placeholder="Например, Москва"
                autocomplete="off"
                maxlength="100"
                autofocus
                required
                minlength="2"
                aria-autocomplete="list"
                aria-expanded="false"
                aria-controls="citySuggestList"
              />
              <ul id="citySuggestList" class="city-suggest-list" role="listbox" hidden></ul>
            </div>

            <div id="recentCitiesRow" class="recent-cities" hidden>
              <span class="recent-cities-label" id="recentCitiesLabel">Недавние</span>
              <div
                id="recentCitiesChips"
                class="recent-cities-chips"
                role="group"
                aria-labelledby="recentCitiesLabel"
              ></div>
            </div>

            <div class="days-slider-block">
              <label id="daysSliderLabel" for="daysSlider">Срок прогноза</label>
              <div class="days-slider-row">
                <span class="days-slider-edge" aria-hidden="true">1</span>
                <input
                  id="daysSlider"
                  name="days"
                  type="range"
                  min="0"
                  max="2"
                  step="1"
                  value="1"
                  aria-labelledby="daysSliderLabel"
                  aria-valuetext="3 дня"
                />
                <span class="days-slider-edge" aria-hidden="true">10</span>
              </div>
              <div class="days-slider-ticks" aria-hidden="true">
                <span>1 день</span>
                <span>3 дня</span>
                <span>10 дней</span>
              </div>
              <p id="daysSliderCaption" class="days-slider-caption">3 дня</p>
            </div>

            <button id="forecastButton" class="btn" type="submit">Показать прогноз</button>
          </div>
        </form>

        <div id="forecastError" class="error-block" role="alert" aria-live="assertive" hidden></div>
        <div id="forecastSkeleton" class="forecast-skeleton" hidden aria-hidden="true"></div>
        <div id="forecastSummary" class="forecast-summary" hidden></div>
        <div id="forecastCards" class="forecast-cards" aria-live="polite"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
