<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Прогноз погоды</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="header">
        <h1 class="title">🌤️ Прогноз погоды</h1>
        <p class="subtitle">📅 до 5 дней · OpenWeatherMap</p>
      </header>

      <form id="form" class="card" autocomplete="off">
        <label class="label" for="city">🏙️ Город</label>
        <input
          id="city"
          name="city"
          type="text"
          placeholder="Например: Санкт-Петербург или London"
          maxlength="120"
          required
        />
        <button type="submit" id="submit" class="btn">🔎 Показать прогноз</button>
        <p id="error" class="error" hidden></p>
      </form>

      <section id="result" class="result" hidden></section>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
